name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Secret scan — fails the build on ANY finding ──────────────────────────
  secret-scan:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # No org license needed for public repos. A finding exits non-zero
          # and fails the job.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  # ── Light lint — py_compile + basic markdown sanity ───────────────────────
  lint:
    name: lint (python + markdown)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile all Python files
        run: |
          set -e
          files=$(find . -name '*.py' -not -path '*/node_modules/*' -not -path '*/.venv/*' -not -path '*/venv/*')
          if [ -z "$files" ]; then
            echo "No Python files found — skipping."
            exit 0
          fi
          echo "$files" | xargs -n1 python -m py_compile
          echo "All Python files compiled cleanly."

      - name: Basic markdown sanity check
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # Empty markdown files are almost always a mistake.
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Markdown file is empty"
              fail=1
            fi
            # Unbalanced fenced code blocks break rendering.
            fences=$(grep -c '^```' "$f" || true)
            if [ $((fences % 2)) -ne 0 ]; then
              echo "::error file=$f::Unbalanced code fence (odd number of ``` lines)"
              fail=1
            fi
          done < <(find . -name '*.md' -not -path '*/node_modules/*')
          if [ "$fail" -ne 0 ]; then
            echo "Markdown sanity check failed."
            exit 1
          fi
          echo "Markdown sanity check passed."
